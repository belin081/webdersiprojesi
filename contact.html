    <link rel="stylesheet" href="style.css">
</head>
<body>

    <nav class="navbar navbar-expand-lg navbar-dark shadow sticky-top">
    <div class="container">
        <a class="navbar-brand fw-bold d-flex align-items-center" href="index.html">
            <i class="bi bi-code-slash me-2 fs-4"></i> 
            <span>Belinay Kartal</span>

        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav" aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">

        </button>

        <div class="collapse navbar-collapse" id="navbarNav">
            <ul class="navbar-nav ms-auto">
                    <li class="nav-item"><a class="nav-link" href="index.html">Ana Sayfa</a></li>

        </div>
    </nav>

    <div class="container py-5">
        <h1 class="text-center mb-5 fw-bold" style="color: #4B3F72;">Bana Ulaşın</h1>

        <div class="row justify-content-center">
            <div class="col-lg-8">
                <div class="card border-0 shadow-lg rounded-4 overflow-hidden">
                    <div class="row g-0">
                        <div class="col-md-4 text-white p-4 d-flex flex-column justify-content-center" style="background-color: #4B3F72;">
                            <h4 class="fw-bold mb-4">İletişim Bilgileri</h4>
                            <p class="small"><i class="bi bi-geo-alt-fill me-2"></i> Sakarya Üniversitesi, Esentepe Kampüsü</p>
                            <p class="small"><i class="bi bi-envelope-fill me-2"></i> belinay.kartal@ogr.sakarya.edu.tr</p>
                            <div class="mt-4">
                                <a href="#" class="text-white me-3"><i class="bi bi-linkedin fs-4"></i></a>
                                <a href="#" class="text-white"><i class="bi bi-github fs-4"></i></a>
                            </div>
                        </div>

                        <div class="col-md-8 bg-white p-4">
                            <form onsubmit="return IletisimKontrol()">
                                <div class="mb-3">
                                    <label class="form-label fw-bold">Adınız Soyadınız</label>
                                    <input type="text" id="name" class="form-control rounded-3" placeholder="Örn: Belinay Kartal">
                                </div>
                                <div class="mb-3">
                                    <label class="form-label fw-bold">E-posta Adresiniz</label>
                                    <input type="email" id="c_email" class="form-control rounded-3" placeholder="adiniz@örnek.com">
                                </div>
                                <div class="mb-3">
                                    <label class="form-label fw-bold">Mesajınız</label>
                                    <textarea id="message" class="form-control rounded-3" rows="4" placeholder="Mesajınızı buraya yazın..."></textarea>
                                </div>
                                <button type="submit" class="btn text-white w-100 fw-bold rounded-pill shadow-sm" style="background-color: #4B3F72;">Gönder</button>
                            </form>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <footer>
        <p class="mb-0">© 2026 Belinay Kartal | Tüm hakları saklıdır.</p>
    </footer>

    <script>
        function IletisimKontrol() {
            var ad = document.getElementById("name").value;
            var mail = document.getElementById("c_email").value;
            var mesaj = document.getElementById("message").value;

            // Hocanın "FrmKontrol" mantığıyla boşluk kontrolü
            if (ad.length < 2) {
                alert("Lütfen isminizi giriniz.");
                return false;
            }

            if (!mail.includes("@") || mail.length < 5) {
                alert("Lütfen geçerli bir e-posta adresi giriniz.");
                return false;
            }

            if (mesaj.length < 10) {
                alert("Mesajınız çok kısa, lütfen biraz daha detay veriniz.");
                return false;
            }

            alert("Mesajınız başarıyla iletildi! En kısa sürede döneceğim.");
            return true;
        }
    </script>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
