</head>
<body>

    <nav class="navbar navbar-expand-lg navbar-dark shadow">
        <div class="container">
            <a class="navbar-brand fw-bold" href="index.html">
            <i class="bi bi-code-slash me-2 fs-4"></i> 
            <span>Belinay Kartal</span>
            </a>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item"><a class="nav-link" href="index.html">Ana Sayfa</a></li>
                <li class="nav-item"><a class="nav-link" href="about.html">Hakkında</a></li>

                    <a class="btn btn-outline-success ms-lg-3 mt-2 mt-lg-0" href="login.html">Giriş Yap</a>
                </li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="container d-flex justify-content-center align-items-center" style="min-height: 80vh;">
        <div class="card border-0 shadow-lg rounded-4 p-5" style="max-width: 450px; width: 100%;">
            <div class="text-center mb-4">
                <div class="display-1 text-primary"><i class="bi bi-person-circle" style="color: #4B3F72;"></i></div>
                <h2 class="fw-bold" style="color: #4B3F72;">Giriş Yap</h2>
                <p class="text-muted small">Lütfen bilgilerinizi kontrol ederek giriniz.</p>
            </div>

            <form id="loginForm">
                <div class="mb-3">
                    <label class="form-label fw-bold">Kullanıcı Adı (E-posta)</label>
                    <div class="input-group">
                        <span class="input-group-text bg-white border-end-0"><i class="bi bi-envelope"></i></span>
                        <input type="email" id="email" class="form-control border-start-0" placeholder="g231210xxx@sakarya.edu.tr" required>
                    </div>
                </div>

                <div class="mb-4">
                    <label class="form-label fw-bold">Şifre</label>
                    <div class="input-group">
                        <span class="input-group-text bg-white border-end-0"><i class="bi bi-lock"></i></span>
                        <input type="password" id="password" class="form-control border-start-0" placeholder="Şifreniz" required>
                    </div>
                </div>

                <button type="submit" class="btn w-100 py-2 fw-bold text-white shadow-sm" style="background-color: #4B3F72; border-radius: 50px;">
                    Giriş Yap
                </button>
            </form>

            <div id="loginMessage" class="mt-4 text-center"></div>
        </div>
    </div>

    <footer>
        <p class="mb-0">© 2026 Kişisel Web Sitesi | Tüm hakları saklıdır.</p>
    </footer>

   <script>
    function FrmKontrol() {
        // Hocanın kullandığı değişken isimleri ve yöntemle alıyoruz
        var usrKul = document.getElementById("email").value;
        var s1 = document.getElementById("password").value;

        // 1. Kullanıcı adı (e-posta) uzunluk kontrolü
        if (usrKul.length < 3) {
            alert("Lütfen kullanıcı adını kontrol ediniz");
            return false;
        }

        // 2. Şifre uzunluk kontrolü
        if (s1.length < 3) {
            alert("Şifreler minimum 3 karakter olmalı");
            return false;
        }

        // 3. E-posta format kontrolü (Ödev kriteri için ekledik)
        if (!usrKul.includes("@sakarya.edu.tr")) {
            alert("Lütfen Sakarya Üniversitesi e-postanızı giriniz");
            return false;
        }

        // Eğer her şey doğruysa
        alert("Giriş başarılı! Hoş geldin Belinay.");
        window.location.href = "index.html"; // Ana sayfaya yönlendir
        return true;
    }
  </script>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
