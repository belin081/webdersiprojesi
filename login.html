    <div class="container login-wrapper">
        <div class="login-card shadow-lg">
            <h2 class="text-center mb-4">Giriş Yap</h2>
            
            <form action="login.php" method="POST" onsubmit="return FrmKontrol()">
                <div class="mb-3">
                    <label class="form-label small fw-bold">E-posta</label>
                    <input type="email" name="email" id="email" class="form-control" placeholder="b2412100001@sakarya.edu.tr">
                </div>

                <div class="mb-3">
                    <label class="form-label small fw-bold">Şifre</label>
                    <input type="password" name="password" id="password" class="form-control" placeholder="Şifre">
                </div>

                <div class="mb-4">
                    <label class="form-label small fw-bold">Şifre Tekrar</label>
                    <input type="password" id="password2" class="form-control" placeholder="Şifre Tekrar">
                </div>

                <button type="submit" class="btn btn-login w-100 py-2">Giriş Yap</button>
            </form>
        </div>
    </div>

    <footer>

    <script>
    function FrmKontrol(){
        var email = document.getElementById("email").value;
        var sifre = document.getElementById("password").value;
        var sifre2 = document.getElementById("password2").value;

        // Boş kontrol
        if(email == "" || sifre == "" || sifre2 == ""){
            alert("Lütfen tüm alanları doldurunuz!");
            return false;
        }

        // Mail kontrol
        if(!email.includes("@sakarya.edu.tr")){
            alert("Geçerli bir okul maili giriniz (@sakarya.edu.tr)");
            return false;
        }

        // Şifre uzunluk
        if(sifre.length < 8){
            alert("Şifre en az 8 karakter olmalı!");
            return false;
        }

        // Şifre eşleşme
        if(sifre !== sifre2){
            alert("Girdiğiniz şifreler birbiriyle uyuşmuyor!");
            return false;
        }

        return true; // Her şey doğruysa login.php'ye gönderir
    }
    </script>
