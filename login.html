<body>

<h1>Giriş Yap</h1>

<div class="container">

  <form onsubmit="return kontrol()">

    <label>Kullanıcı Adı:</label><br>
    <input type="text" id="kullanici"><br><br>

    <label>Şifre:</label><br>
    <input type="password" id="sifre"><br><br>

    <button type="submit">Giriş Yap</button>

  </form>

</div>

<script>
function kontrol() {
  let kullanici = document.getElementById("kullanici").value;
  let sifre = document.getElementById("sifre").value;

  if (kullanici == "" || sifre == "") {
    alert("Boş bırakmayın!");
    return false;
  }

  if (kullanici == "admin" && sifre == "1234") {
    alert("Giriş başarılı!");
    return true;
  } else {
    alert("Hatalı giriş!");
    return false;
  }
}
</script>

</body>
</html>
